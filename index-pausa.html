<!DOCTYPE html>
<html lang="it">
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta charset="UTF-8">
<meta http-equiv="refresh" content="0; url=hullid_demo.html">
<title>HullID</title>

<style>

  /* ============================================
     HULLID MOBILE RESPONSIVE - v2.0
     ============================================ */

  /* Hamburger button (hidden on desktop) */
  .nav-hamburger {
    display: none; flex-direction: column; justify-content: center;
    gap: 5px; cursor: pointer; padding: 8px; background: none; border: none;
  }
  .nav-hamburger span {
    display: block; width: 22px; height: 2px;
    background: var(--white-pure, #fff); transition: all 0.3s ease; border-radius: 2px;
  }
  .nav-hamburger.open span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
  .nav-hamburger.open span:nth-child(2) { opacity: 0; transform: scaleX(0); }
  .nav-hamburger.open span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }

  @media (max-width: 1100px) {
    .hero-right { display: none; }
  }

  @media (max-width: 1024px) {
    nav { padding: 0 24px; }
    .nav-links { gap: 20px; }
    .b2b-grid { grid-template-columns: repeat(2, 1fr); }
  }

  @media (max-width: 900px) {
    nav { padding: 0 24px; }
    .nav-links { display: none; }
    section { padding: 60px 24px; }
    .hero-content { padding: 0 24px; }
    .stats-bar { padding: 24px; flex-wrap: wrap; gap: 20px; }
    .registro-grid, .marketplace-grid, .scheda-layout, .b2b-grid { grid-template-columns: 1fr; }
    .footer-grid { grid-template-columns: 1fr 1fr; }
    .timeline-container { padding-left: 28px; }
  }

  @media (max-width: 768px) {
    nav { padding: 0 20px; height: 60px; }
    .nav-hamburger { display: flex; }
    .nav-links {
      display: none; position: fixed; top: 60px; left: 0; right: 0;
      flex-direction: column; gap: 0; background: rgba(13,27,42,0.98);
      backdrop-filter: blur(12px); border-bottom: 1px solid rgba(201,168,76,0.2);
      padding: 8px 0 16px; z-index: 98;
    }
    .nav-links.mobile-open { display: flex; }
    .nav-links li { width: 100%; }
    .nav-links a { display: block; padding: 13px 24px; font-size: 0.85rem; border-bottom: 1px solid rgba(255,255,255,0.04); }
    .nav-links li:last-child a { margin: 10px 20px 0; padding: 11px 20px; text-align: center; border-bottom: none; }
    .hero { padding-top: 60px; min-height: 100svh; align-items: flex-start; }
    .hero-content { padding: 40px 20px 48px; width: 100%; max-width: 100%; }
    .hero-right { display: none; }
    .hero-eyebrow { font-size: 0.62rem; letter-spacing: 0.14em; }
    .hero-title { font-size: 2.6rem; line-height: 1.05; }
    .hero-subtitle { font-size: 0.95rem; margin: 16px 0 28px; max-width: 100%; }
    .hero-buttons { flex-direction: column; gap: 12px; align-items: stretch; }
    .hero-buttons .btn-primary, .hero-buttons .btn-outline { text-align: center; padding: 14px 20px; width: 100%; }
    .stats-bar { flex-wrap: wrap; padding: 20px; gap: 0; }
    .stat-item { flex: 1 1 45%; padding: 12px 8px; border-right: none !important; border-bottom: 1px solid rgba(201,168,76,0.15); }
    .stat-item:nth-child(odd) { border-right: 1px solid rgba(201,168,76,0.15) !important; }
    .stat-divider { display: none; }
    .registro-section, .scheda-section, .timeline-section, .marketplace-section, .b2b-section, .manifesto-section { padding: 60px 20px !important; }
    .scheda-layout { grid-template-columns: 1fr !important; gap: 32px; }
    .section-title { font-size: 1.9rem !important; line-height: 1.1 !important; }
    .section-eyebrow { font-size: 0.62rem !important; }
    .section-text { font-size: 0.95rem !important; }
    input, select, textarea { font-size: 16px !important; }
    .soci-card { width: 100% !important; max-width: 100% !important; }
    .boat-specs { grid-template-columns: repeat(2, 1fr); gap: 6px; }
    #boatsGrid { grid-template-columns: 1fr !important; gap: 16px !important; }
    div[style*="repeat(4,1fr)"], div[style*="repeat(4, 1fr)"] { grid-template-columns: 1fr 1fr !important; gap: 20px !important; }
    div[style*="grid-template-columns:1fr 1fr"], div[style*="grid-template-columns: 1fr 1fr"] { grid-template-columns: 1fr !important; gap: 24px !important; }
    div[style*="padding:96px 80px"], div[style*="padding: 96px 80px"] { padding: 60px 20px !important; }
    section[style*="padding:96px"], section[style*="padding: 96px"] { padding-left: 20px !important; padding-right: 20px !important; }
    .scheda-card { padding: 20px !important; }
    .scheda-row { grid-template-columns: 1fr 1fr !important; gap: 12px; }
    .timeline-container { padding-left: 16px; }
    .timeline-item { padding-left: 28px; margin-bottom: 28px; }
    .timeline-item-header { flex-direction: column; align-items: flex-start; gap: 8px; }
    .timeline-item-date { font-size: 0.75rem; }
    .timeline-item-footer { flex-direction: column; gap: 6px; align-items: flex-start; }
    .marketplace-grid { grid-template-columns: 1fr !important; gap: 20px; }
    .listing-card { max-width: 480px; margin: 0 auto; width: 100%; }
    .listing-price { font-size: 1.4rem; }
    .listing-highlights { flex-wrap: wrap; gap: 6px; }
    .b2b-grid { grid-template-columns: 1fr !important; gap: 16px; }
    .partner-card { padding: 20px !important; }
    .partner-footer { flex-direction: column; gap: 8px; align-items: flex-start; }
    .manifesto-section { text-align: center; }
    .manifesto-quote { font-size: 1.3rem !important; }
    .footer-grid { grid-template-columns: 1fr !important; gap: 32px; }
    .footer-bottom { flex-direction: column !important; gap: 8px; text-align: center; }
    .modal-overlay .modal-card { width: 90%; max-width: 360px; padding: 28px 20px; }
    .qr-placeholder { width: 140px !important; height: 140px !important; }
    /* Dashboard / panel mobile */
    .sidebar { transform: translateX(-100%); position: fixed; z-index: 200; transition: transform 0.3s ease; }
    .sidebar.mobile-open { transform: translateX(0); }
    .main-content { margin-left: 0 !important; padding: 16px !important; }
    .panel-grid, .stats-grid { grid-template-columns: 1fr !important; gap: 16px !important; }
    .card { padding: 16px !important; }
    table { display: block; overflow-x: auto; -webkit-overflow-scrolling: touch; }
    .form-row { flex-direction: column !important; gap: 12px !important; }
    .btn-group { flex-direction: column !important; gap: 8px !important; }
    .tab-nav { overflow-x: auto; white-space: nowrap; -webkit-overflow-scrolling: touch; }
    .tab-nav::-webkit-scrollbar { display: none; }
    .page-header { flex-direction: column !important; align-items: flex-start !important; gap: 12px !important; }
    .header-actions { width: 100% !important; }
    .header-actions .btn { width: 100% !important; text-align: center !important; }
  }

  @media (max-width: 480px) {
    .hero-title { font-size: 2rem; }
    .section-title { font-size: 1.6rem !important; }
    .manifesto-quote { font-size: 1.1rem !important; }
    .scheda-row { grid-template-columns: 1fr !important; }
    .stat-number { font-size: 1.4rem; }
    div[style*="repeat(4,1fr)"], div[style*="repeat(4, 1fr)"] { grid-template-columns: 1fr !important; }
    .card-title { font-size: 1rem !important; }
    .btn { padding: 10px 16px !important; font-size: 0.85rem !important; }
  }

</style>
</head>
<body>
<script>window.location.href='hullid_demo.html';</script>

<script>
/* HullID Mobile Nav - auto-injected */
(function(){
  var ham = document.querySelector('.nav-hamburger');
  var nav = document.querySelector('.nav-links');
  if(!ham || !nav) return;
  ham.addEventListener('click', function(){
    this.classList.toggle('open');
    nav.classList.toggle('mobile-open');
  });
  document.addEventListener('click', function(e){
    if(!ham.contains(e.target) && !nav.contains(e.target)){
      ham.classList.remove('open');
      nav.classList.remove('mobile-open');
    }
  });
})();
</script>

</body>
</html>
